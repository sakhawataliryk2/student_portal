<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pan-Atlantic University :: Student Portal</title>
   
    <link rel="stylesheet" href="style.css">
   
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body>

    <div class="login-container">
        <div class="login-box">
            
            <img src="images/logo.png" alt="University Logo" class="logo">
            
            <p class="portal-title">Pan-Atlantic University</p>
            <p class="portal-subtitle">Student Portal</p>

            <div id="error-message" class="error-message"></div>

            <form id="loginForm">
                <div class="input-container">
                    <input type="text" id="email" class="input-field" placeholder="Email/Admission Number" required>
                </div>
                
                <div class="input-container">
                    <input type="password" id="password" class="input-field" placeholder="Password" required>
                </div>
                
                <div class="links-container">
                    <a href="#" class="link">Switch School</a>
                    <a href="#" class="link"><i class="fas fa-lock"></i> Forgot password?</a>
                </div>
                
                <button type="submit" class="login-btn">STUDENT LOG IN</button>
            </form>

            <p class="copyright">© Pau™ 2025 Pan Atlantic University app™</p>
        </div>
    </div>

    <div class="chat-icon">
        <i class="fas fa-comment-dots"></i>
    </div>


    <script>
        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault(); 
     
            const correctEmail = 'Oluwaseun.owolabi@pau.edu.ng';
            const correctPass = 'Esanneka1267';

            const enteredEmail = document.getElementById('email').value;
            const enteredPass = document.getElementById('password').value;
            const errorMessage = document.getElementById('error-message');

            if (enteredEmail === correctEmail && enteredPass === correctPass) {
               
                errorMessage.style.display = 'none';
                window.location.href = 'dashboard.html';
            } else {
              
                errorMessage.textContent = 'Wrong Credentials!';
                errorMessage.style.display = 'block';
            }
        });
    </script>

</body>
</html>
